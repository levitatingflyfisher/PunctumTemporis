name: Deploy C3 Website to Cloudflare Pages

# Required secrets:
#   CLOUDFLARE_API_TOKEN — API token with Cloudflare Pages edit permissions
#   CLOUDFLARE_ACCOUNT_ID — your Cloudflare account ID
#
# Cloudflare Pages project setup:
#   Project name: c3-website
#   Custom domain: [C3_DOMAIN].org and www.[C3_DOMAIN].org
#   Build command: (handled by this workflow — leave blank in dashboard)
#   Output directory: dist

on:
  push:
    branches:
      - main
    paths:
      - 'c3_website/**'
      - '.github/workflows/deploy-website.yml'
  workflow_dispatch:

jobs:
  build-and-deploy:
    name: Build Astro + Deploy to Cloudflare Pages
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: c3_website/package-lock.json

      - name: Install dependencies
        working-directory: c3_website
        run: npm ci

      - name: Build site
        working-directory: c3_website
        run: npm run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: c3-website
          directory: c3_website/dist
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          branch: ${{ github.ref_name }}
